name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  deterministic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install C++ toolchain
        run: sudo apt-get update && sudo apt-get install -y g++ make bash
      - name: Validate scaffold contract
        run: python3 scripts/validate_scaffold.py
      - name: Build and test
        run: make test
