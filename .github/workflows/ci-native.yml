name: ci-native

on:
  push:
    branches: [main]
  pull_request:

jobs:
  native:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - name: Compiler proof
        run: make compiler-proof
      - name: Build and test
        run: make test
